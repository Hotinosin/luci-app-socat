name: "Build luci-app-socat (IPK & APK)"

on:
  repository_dispatch:
  workflow_dispatch:
  push:
分支:
      - "main"
    paths:
      - "Makefile"
      - "luci-app-socat/**"

env:
  TZ: Asia/Shanghai
  PACKAGE_NAME: luci-app-socat

jobs:
  job_check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.check_version.outputs.latest_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version Tag
        id: check_version
        run: |
          latest_version="v$(date +%Y%m%d%H%M)"
          echo "latest_version=${latest_version}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Build for OpenWrt Official SDK
          tag_name: ${{ steps.check_version.outputs.latest_version }}

  # --- 编译 IPK (基于 24.10) ---
  build_ipk:
    name: Build IPK (v24.10)
    needs: job_check
    runs-on: ubuntu-latest
    steps:
      - name: Install Packages
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq clean

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-ipk-24.10-x86-64

      - name: Init SDK Environment
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          url_sdk="https://archive.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -qO- $url_sdk | tar --zstd -xvf - -C ./
          mv openwrt-sdk-* sdk
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Package
        run: |
          cd sdk
          # 链接当前仓库代码到 SDK package 目录
          ln -s $GITHUB_WORKSPACE/${{ env.PACKAGE_NAME }} package/${{ env.PACKAGE_NAME }}
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" > .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          make defconfig
          make package/${{ env.PACKAGE_NAME }}/compile -j$(nproc)
          
      - name: Upload IPK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.job_check.outputs.latest_version }}
          files: sdk/bin/packages/x86_64/base/${{ env.PACKAGE_NAME }}*

  # --- 编译 APK (基于 25.12 Snapshot) ---
  build_apk:
    name: Build APK (v25.12 Snapshot)
    needs: job_check
    runs-on: ubuntu-latest
    steps:
      - name: Install Packages
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq clean

      - name: Cache SDK (APK)
        id: cache-sdk-apk
        uses: actions/cache@v4
        with:
          path: sdk_apk
          key: sdk-apk-snapshot-x86-64

      - name: Init SDK Environment (APK)
        if: steps.cache-sdk-apk.outputs.cache-hit != 'true'
        run: |
          url_sdk="https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          wget -qO- $url_sdk | tar --zstd -xvf - -C ./
          mv openwrt-sdk-* sdk_apk
          cd sdk_apk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Package
        run: |
          cd sdk_apk
          ln -s $GITHUB_WORKSPACE/${{ env.PACKAGE_NAME }} package/${{ env.PACKAGE_NAME }}
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" > .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          make defconfig
          make package/${{ env.PACKAGE_NAME }}/compile -j$(nproc)

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.job_check.outputs.latest_version }}
          files: sdk_apk/bin/packages/x86_64/base/${{ env.PACKAGE_NAME }}*.apk
