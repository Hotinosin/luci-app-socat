name: build
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PACKAGE_NAME: luci-app-socat
      PACKAGE_I18N_NAME: luci-i18n-socat-zh-cn
      # 更新后的 SDK URL
      SDK_URL: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
    steps:
      - name: 优化编译依赖安装 (增加 zstd 支持)
        run: |
          sudo -E apt update
          # 必须包含 zstd 以解压最新的 SDK 格式
          sudo -E apt install -y build-essential clang flex gawk gettext \
            git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget swig tar zstd
          
          sudo -E apt autoremove --purge -y
          sudo -E apt clean
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 下载并解压 SDK (GCC 14.3.0 ZST)
        run: |
          wget -qO openwrt.tar.zst "${{ env.SDK_URL }}"
          mkdir openwrt
          # 使用 --strip-components=1 直接解压内容到 openwrt 文件夹，忽略外层长目录名
          tar -I zstd -xvf openwrt.tar.zst -C openwrt --strip-components=1
          echo "OPENWRT_ROOT_PATH=$GITHUB_WORKSPACE/openwrt" >> $GITHUB_ENV

      - name: 检出源码
        uses: actions/checkout@v4
        with:
          path: ${{ env.OPENWRT_ROOT_PATH }}/package/${{ env.PACKAGE_NAME }}-clone

      - name: 整理目录与 Feeds
        working-directory: ${{ env.OPENWRT_ROOT_PATH }}
        run: |
          cp -RT ./package/${{ env.PACKAGE_NAME }}-clone/${{ env.PACKAGE_NAME }} ./package/${{ env.PACKAGE_NAME }}
          rm -rf ./package/${{ env.PACKAGE_NAME }}-clone
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置与编译 (支持 IPK & APK)
        working-directory: ${{ env.OPENWRT_ROOT_PATH }}
        run: |
          echo "CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m" > .config
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          make defconfig
          # 编译指定的包
          make package/${{ env.PACKAGE_NAME }}/compile -j$(nproc) V=s

      - name: 归档成果 (同时收集 .ipk 和 .apk)
        working-directory: ${{ env.OPENWRT_ROOT_PATH }}
        run: |
          mkdir -p ./artifact
          # 遍历 bin 目录，寻找所有生成的 ipk 和 apk 文件并扁平化存放
          find ./bin/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp {} ./artifact/ \;
          if [ -z "$(ls -A ./artifact)" ]; then
            echo "错误：未发现编译生成的安装包！"
            exit 1
          fi

      - name: 上传 Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-snapshot-output
          path: ${{ env.OPENWRT_ROOT_PATH }}/artifact/
